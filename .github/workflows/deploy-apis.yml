name: Deploy Tyk APIs

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ENV: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      ####################################################
      # Install summon
      ####################################################
      - name: Install summon
        run: |
          curl -L https://github.com/cyberark/summon/releases/latest/download/summon-linux-amd64.tar.gz | tar zx
          sudo mv summon /usr/local/bin/

      ####################################################
      # Install summon-conjur
      ####################################################
      - name: Install summon-conjur
        run: |
          curl -L https://github.com/cyberark/summon-conjur/releases/latest/download/summon-conjur-linux-amd64 -o summon-conjur
          chmod +x summon-conjur
          sudo mv summon-conjur /usr/local/bin/

      ####################################################
      # Install envsubst
      ####################################################
      - name: Install envsubst
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base

      ####################################################
      # Render APIs using Conjur secrets
      ####################################################
      - name: Render API definitions
        env:
          CONJUR_APPLIANCE_URL: ${{ secrets.CONJUR_URL }}
          CONJUR_ACCOUNT: ${{ secrets.CONJUR_ACCOUNT }}
          CONJUR_AUTHN_LOGIN: admin
          CONJUR_AUTHN_API_KEY: ${{ secrets.CONJUR_API_KEY }}
        run: |

          mkdir -p rendered-apis

          for file in $ENV/apis/*.json
          do
            API=$(basename $file .json)

            summon -f secrets/conjur-map.yml \
                   -D ENV=$ENV \
                   -D API=$API \
                   envsubst < $file > rendered-apis/$API.json
          done

      ####################################################
      # Generate tyk-sync index file
      ####################################################
      - name: Generate .tyk.json
        run: |
          cd rendered-apis
          echo '{"type":"apis","files":[' > .tyk.json

          first=true
          for file in *.json
          do
            if [ "$first" = true ]; then
              echo "\"$file\"" >> .tyk.json
              first=false
            else
              echo ",\"$file\"" >> .tyk.json
            fi
          done

          echo "]}" >> .tyk.json
          cat .tyk.json

      ############################################
      # Deploy APIs using tyk-sync Docker image
      ############################################
      - name: Sync APIs to Tyk
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/rendered-apis:/app/data \
            tykio/tyk-sync:latest \
            sync \
            --dashboard "${{ secrets.TYK_DASHBOARD_URL }}" \
            --secret "${{ secrets.TYK_DASHBOARD_API_KEY }}" \
            --path /app/data \
            --no-delete